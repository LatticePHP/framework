name: Close Pull Request

on:
  pull_request_target:
    types: [opened]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: superbrothers/close-pull-request@v3
        with:
          comment: |
            Thank you for your pull request! However, this repository is a **read-only split** of [LatticePHP/framework](https://github.com/LatticePHP/framework).

            Please submit your PR at **https://github.com/LatticePHP/framework** instead.

            All contributions should target the monorepo. Split repos are auto-synced on every push to `main`.
