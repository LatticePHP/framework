name: Bug Report
description: Report a bug in LatticePHP
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: LatticePHP Version
      description: "Output of `composer show lattice/core | grep versions`"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      description: "Output of `php -v`"
      placeholder: "8.4.0"
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "api-key"
        - "auth"
        - "authorization"
        - "cache"
        - "compiler"
        - "contracts"
        - "core"
        - "database"
        - "devtools"
        - "events"
        - "filesystem"
        - "grpc"
        - "http"
        - "http-client"
        - "jsonapi"
        - "jwt"
        - "mail"
        - "microservices"
        - "module"
        - "notifications"
        - "oauth"
        - "observability"
        - "openapi"
        - "openswoole"
        - "pat"
        - "pipeline"
        - "problem-details"
        - "queue"
        - "rate-limit"
        - "roadrunner"
        - "routing"
        - "scheduler"
        - "serializer"
        - "social"
        - "testing"
        - "transport-kafka"
        - "transport-nats"
        - "transport-rabbitmq"
        - "transport-sqs"
        - "validation"
        - "workflow"
        - "workflow-store"
        - "other (specify in description)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages and stack traces.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context — OS, database driver, runtime (FPM/RoadRunner/OpenSwoole), config snippets.
    validations:
      required: false
